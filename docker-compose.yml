version: '3.9'

services:

  # ─────────────────────────────────────────────
  # MongoDB (Replica Set requerido por Prisma)
  # ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: boxful_mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: boxful
    volumes:
      - mongo_data:/data/db
    networks:
      - boxful_net
    healthcheck:
      test: mongosh --host localhost --eval "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  # API (NestJS)
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: boxful_api
    restart: unless-stopped
    ports:
      - '${PORT:-3001}:3001'
    environment:
      DATABASE_URL: mongodb://mongo:27017/boxful?replicaSet=rs0
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
    depends_on:
      - mongo
    networks:
      - boxful_net

  # ─────────────────────────────────────────────
  # Seeder (corre una vez y termina)
  # ─────────────────────────────────────────────
  seeder:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: boxful_seeder
    command: >
      sh -c "npx prisma db push --accept-data-loss &&
             npx ts-node seed/seed.ts"
    environment:
      DATABASE_URL: mongodb://mongo:27017/boxful?replicaSet=rs0
    depends_on:
      - mongo
    networks:
      - boxful_net
    restart: 'no'

volumes:
  mongo_data:

networks:
  boxful_net:
    driver: bridge
